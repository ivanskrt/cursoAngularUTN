<section class="usuarios">
  <h2>Lista de usuarios</h2>
  <a routerLink="/usuarios/crear" class="btn">Crear usuario</a>
  <ul>
    <li *ngFor="let user of usuarios">
      <div class="fila">
        <div>
          <div class="nombre">{{ user.nombre }}</div>
          <div class="meta">{{ user.email }} · {{ user.rol }} · <strong>{{ user.activo ? 'Activo' : 'Inactivo' }}</strong></div>
        </div>
        <div class="acciones">
          <a [routerLink]="['/usuarios', user.id]">Ver detalle</a>
          <button (click)="eliminar(user.id)">Eliminar</button>
          <button (click)="toggleEstado(user.id)">{{ user.activo ? 'Desactivar' : 'Activar' }}</button>
        </div>
      </div>
    </li>
  </ul>
</section>
